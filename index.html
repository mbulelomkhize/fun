<div id="introScreen" class="intro">
  <div class="intro-box">
    <h2>🧠 Learn Bubble Sort</h2>

    <p>
      Bubble Sort is a simple algorithm.
      It compares two numbers next to each other.
    </p>

    <p>
      👉 If the left number is bigger, we SWAP them  
      👉 If not, we leave them
    </p>

    <p>
      This process repeats until everything is sorted.
    </p>

    <p class="example">
      Example: 5, 3 → swap → 3, 5
    </p>

    <button onclick="startGameWithIntro()">Start Game 🚀</button>
  </div>
</div>
